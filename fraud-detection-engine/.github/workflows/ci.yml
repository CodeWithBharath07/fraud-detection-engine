name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-inference:
    name: Test Inference Service (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inference-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v

  test-spring-consumer:
    name: Test Spring Consumer (Java)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spring-consumer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - run: mvn test -B

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-inference, test-spring-consumer]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push inference service
        uses: docker/build-push-action@v5
        with:
          context: ./inference-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-inference:latest

      - name: Build & push spring consumer
        uses: docker/build-push-action@v5
        with:
          context: ./spring-consumer
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-consumer:latest

      - name: Build & push kafka producer
        uses: docker/build-push-action@v5
        with:
          context: ./kafka-producer
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-producer:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-frontend:latest
